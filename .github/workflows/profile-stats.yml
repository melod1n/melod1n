name: Generate profile stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.0

      - uses: vn7n24fzkq/github-profile-summary-cards@v0.11.6
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: melod1n
          BRANCH_NAME: main
          UTC_OFFSET: 3
          AUTO_PUSH: true
          THEME: radical